openapi: 3.0.2
servers:
  - description: Local Dev
    url: http://localhost:5000
  - description: Dev Api
    url: https://agrio-api.dev.agr.ist/adm
info:
  title: Pairs Admin API
  description: High-privilege Portal management surface
  contact:
    email: admin@sophietech.com
  version: "v1"
externalDocs:
  description: Documentation
  url: https://doc-agrio.azurewebsites.net
tags:
  - name: AuthEmployees
    description: Portal employee user management
  - name: Customers
    description: External customer auth/access management
  - name: B2BRepresentatives
    description: External B2B representative auth/access management
  - name: AuthRoles
    description: Portal employee role catalog administration
  - name: AuthExternalRoles
    description: External customer and representative role catalog administration
  - name: AuthIntegrations
    description: External integration administration
  - name: AuthPats
    description: External integration PAT lifecycle administration
  - name: AuthScopes
    description: External machine-access scope catalog administration
paths:
  /adm/auth/v1/customers:
    get:
      tags:
        - Customers
      summary: List customer auth subjects
      description: Returns External customer auth/access subject summaries without CRM
        profile data.
      operationId: listCustomers
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/TermParameter"
        - $ref: "#/components/parameters/StatusParameter"
        - $ref: "#/components/parameters/OffsetParameter"
        - $ref: "#/components/parameters/LimitParameter"
        - $ref: "#/components/parameters/SortParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
        - webSession: []
  /adm/auth/v1/customers/{customerId}:
    get:
      tags:
        - Customers
      summary: Get customer auth subject detail
      description: Returns External customer auth/access detail without CRM profile data.
      operationId: getCustomer
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/customers/{customerId}/disable:
    post:
      tags:
        - Customers
      summary: Disable customer auth access
      description: Disables a customer auth subject and rejects future External login.
      operationId: disableCustomer
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/customers/{customerId}/enable:
    post:
      tags:
        - Customers
      summary: Enable customer auth access
      description: Re-activates a disabled customer auth subject.
      operationId: enableCustomer
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/customers/{customerId}/pin-reset:
    post:
      tags:
        - Customers
      summary: Trigger customer PIN reset
      description: Starts the External customer PIN reset foundation flow when available.
      operationId: triggerCustomerPinReset
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessSubjectPinResetResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/customers/{customerId}/sessions:
    get:
      tags:
        - Customers
      summary: List customer auth sessions
      description: Returns ExternalIdentity refresh session projection for a customer
        auth subject.
      operationId: listCustomerSessions
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessSessionListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/customers/{customerId}/sessions/revoke:
    post:
      tags:
        - Customers
      summary: Revoke customer auth sessions
      description: Revokes matching active ExternalIdentity refresh sessions for a
        customer auth subject.
      operationId: revokeCustomerSessions
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAccessSessionRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessSessionRevokeResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/customers/{customerId}/trusted-devices:
    get:
      tags:
        - Customers
      summary: List customer trusted devices
      description: Returns ExternalIdentity trusted device projection for a customer
        auth subject.
      operationId: listCustomerTrustedDevices
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedDeviceListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/customers/{customerId}/trusted-devices/{deviceId}/revoke:
    post:
      tags:
        - Customers
      summary: Revoke customer trusted device
      description: Revokes a customer trusted device and related active sessions.
      operationId: revokeCustomerTrustedDevice
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
        - $ref: "#/components/parameters/DeviceIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedDeviceRevokeResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/customers/{customerId}/audit-events:
    get:
      tags:
        - Customers
      summary: List customer auth audit events
      description: Returns ExternalIdentity security events for a customer auth
        subject ordered newest first.
      operationId: listCustomerAuditEvents
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/CustomerIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAuditEventListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/b2b-representatives:
    get:
      tags:
        - B2BRepresentatives
      summary: List B2B representative auth subjects
      description: Returns External B2B representative auth/access subject summaries
        without business profile data.
      operationId: listB2BRepresentatives
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/TermParameter"
        - $ref: "#/components/parameters/StatusParameter"
        - $ref: "#/components/parameters/OffsetParameter"
        - $ref: "#/components/parameters/LimitParameter"
        - $ref: "#/components/parameters/SortParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/B2BRepresentativeListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
        - webSession: []
  /adm/auth/v1/b2b-representatives/{representativeId}:
    get:
      tags:
        - B2BRepresentatives
      summary: Get B2B representative auth subject detail
      description: Returns External B2B representative auth/access detail without
        business profile data.
      operationId: getB2BRepresentative
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/B2BRepresentativeDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/b2b-representatives/{representativeId}/disable:
    post:
      tags:
        - B2BRepresentatives
      summary: Disable B2B representative auth access
      description: Disables a B2B representative auth subject and rejects future
        External login.
      operationId: disableB2BRepresentative
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/B2BRepresentativeDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/b2b-representatives/{representativeId}/enable:
    post:
      tags:
        - B2BRepresentatives
      summary: Enable B2B representative auth access
      description: Re-activates a disabled B2B representative auth subject.
      operationId: enableB2BRepresentative
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/B2BRepresentativeDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/b2b-representatives/{representativeId}/pin-reset:
    post:
      tags:
        - B2BRepresentatives
      summary: Trigger B2B representative PIN reset
      description: Starts the External B2B representative PIN reset foundation flow
        when available.
      operationId: triggerB2BRepresentativePinReset
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessSubjectPinResetResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/b2b-representatives/{representativeId}/sessions:
    get:
      tags:
        - B2BRepresentatives
      summary: List B2B representative auth sessions
      description: Returns ExternalIdentity refresh session projection for a B2B
        representative auth subject.
      operationId: listB2BRepresentativeSessions
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessSessionListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/b2b-representatives/{representativeId}/sessions/revoke:
    post:
      tags:
        - B2BRepresentatives
      summary: Revoke B2B representative auth sessions
      description: Revokes matching active ExternalIdentity refresh sessions for a B2B
        representative auth subject.
      operationId: revokeB2BRepresentativeSessions
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAccessSessionRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessSessionRevokeResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/b2b-representatives/{representativeId}/trusted-devices:
    get:
      tags:
        - B2BRepresentatives
      summary: List B2B representative trusted devices
      description: Returns ExternalIdentity trusted device projection for a B2B
        representative auth subject.
      operationId: listB2BRepresentativeTrustedDevices
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedDeviceListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/b2b-representatives/{representativeId}/trusted-devices/{deviceId}/revoke:
    post:
      tags:
        - B2BRepresentatives
      summary: Revoke B2B representative trusted device
      description: Revokes a B2B representative trusted device and related active sessions.
      operationId: revokeB2BRepresentativeTrustedDevice
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
        - $ref: "#/components/parameters/DeviceIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedDeviceRevokeResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/b2b-representatives/{representativeId}/audit-events:
    get:
      tags:
        - B2BRepresentatives
      summary: List B2B representative auth audit events
      description: Returns ExternalIdentity security events for a B2B representative
        auth subject ordered newest first.
      operationId: listB2BRepresentativeAuditEvents
      x-required-role: portal.admin
      x-rpc-target: ExternalIdentity
      parameters:
        - $ref: "#/components/parameters/RepresentativeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAuditEventListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
  /adm/auth/v1/employees:
    get:
      tags:
        - AuthEmployees
      summary: List employees
      description: Returns Portal employee accounts and pending invite summaries.
      operationId: listEmployees
      x-required-role: portal.admin
      x-rpc-target: PortalIdentity
      parameters:
        - $ref: "#/components/parameters/TermParameter"
        - $ref: "#/components/parameters/StatusParameter"
        - $ref: "#/components/parameters/OffsetParameter"
        - $ref: "#/components/parameters/LimitParameter"
        - $ref: "#/components/parameters/SortParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
        - webSession: []
  /adm/auth/v1/employees/{employeeId}:
    get:
      tags:
        - AuthEmployees
      summary: Get employee detail
      description: Returns a Portal employee detail record.
      operationId: getEmployee
      x-required-role: portal.admin
      x-rpc-target: PortalIdentity
      parameters:
        - $ref: "#/components/parameters/EmployeeIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
    patch:
      tags:
        - AuthEmployees
      summary: Update employee profile and roles
      description: Updates display name, preferred username, and role assignments for
        an employee.
      operationId: updateAuthEmployee
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: PortalIdentity
      parameters:
        - $ref: "#/components/parameters/EmployeeIdParameter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetail"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/employees/invites:
    post:
      tags:
        - AuthEmployees
      summary: Create employee invite
      description: Creates and sends a Portal employee invite without returning raw
        invite tokens.
      operationId: createAuthEmployeeInvite
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: PortalIdentity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeInviteRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEmployeeInviteResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
      security:
        - webSession: []
          csrfToken: []
  /adm/auth/v1/employees/invites/{inviteId}/resend:
    post:
      tags:
        - AuthEmployees
      summary: Resend employee invite
      description: Revokes the previous pending invite token, creates a new pending
        delivery, and returns metadata without raw tokens.
      operationId: resendEmployeeInvite
      x-required-role: portal.admin
      x-csrf-required: true
      x-rpc-target: PortalIdentity
      parameters:
        - $ref: "#/components/parameters/InviteIdParameter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeInviteActionResponse"
          headers:
            Content-Language:
              $ref: "#/components/headers/Content-Language"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
