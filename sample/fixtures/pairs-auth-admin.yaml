components:
  headers:
    Content-Language:
      schema:
        type: string
        enum:
          - tr-TR
          - en-US
      description: The language intended for the audience.
      example: tr-TR
    X-RateLimit-Limit:
      schema:
        type: integer
      description: Request limit per hour.
    X-RateLimit-Remaining:
      schema:
        type: integer
      description: The number of requests left for the time window.
    X-RateLimit-Reset:
      schema:
        type: string
        format: date-time
      description: The UTC date/time at which the current rate limit window resets.
  parameters:
    EmployeeIdParameter:
      name: employeeId
      in: path
      required: true
      description: Portal employee subject identifier
      schema:
        type: string
        format: uuid
    InviteIdParameter:
      name: inviteId
      in: path
      required: true
      description: Portal employee invite identifier
      schema:
        type: string
        format: uuid
    CustomerIdParameter:
      name: customerId
      in: path
      required: true
      description: External customer auth subject identifier
      schema:
        type: string
        format: uuid
    RepresentativeIdParameter:
      name: representativeId
      in: path
      required: true
      description: External B2B representative auth subject identifier
      schema:
        type: string
        format: uuid
    IntegrationIdParameter:
      name: integrationId
      in: path
      required: true
      description: External integration identifier
      schema:
        type: string
        format: uuid
    DeviceIdParameter:
      name: deviceId
      in: path
      required: true
      description: External trusted device identifier
      schema:
        type: string
        minLength: 1
    RetrievalTokenParameter:
      name: retrievalToken
      in: path
      required: true
      description: High-entropy one-time PAT retrieval token
      schema:
        type: string
        minLength: 32
    TermParameter:
      name: term
      in: query
      required: false
      description: Free-text filter for email, username, or display name
      schema:
        type: string
    StatusParameter:
      name: status
      in: query
      required: false
      description: Optional employee or invite status filter
      schema:
        type: string
    OffsetParameter:
      name: offset
      in: query
      required: false
      description: Zero-based offset of the first item
      schema:
        type: integer
        minimum: 0
        default: 0
    LimitParameter:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParameter:
      name: sort
      in: query
      required: false
      description: Sort expression with prefix, for example +updatedAt or -email
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad Request - validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized - missing or invalid portal web session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden - portal.admin role or CSRF validation required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict - resource state does not allow this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Gone:
      description: Gone - single-use token was already consumed or expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NoContent:
      description: No Content - operation succeeded with no response body
  schemas:
    EmptyResponse:
      type: object
      additionalProperties: false
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    EmployeeStatusEnum:
      type: string
      enum:
        - active
        - invited
        - disabled
        - locked
    InviteStatusEnum:
      type: string
      enum:
        - pending
        - accepted
        - expired
        - revoked
    DeliveryStatusEnum:
      type: string
      enum:
        - accepted
        - sent
        - masked
        - unavailable
    AccessSubjectStatusEnum:
      type: string
      enum:
        - active
        - disabled
        - locked
    RevokeAccessSessionRequest:
      type: object
      properties:
        sessionId:
          type: string
          nullable: true
          description: Optional session identifier. When omitted, all active sessions for
            the subject are revoked.
        reason:
          type: string
          maxLength: 500
          nullable: true
    AccessSessionRevokeResponse:
      type: object
      properties:
        revokedCount:
          type: integer
          minimum: 0
        revokedAt:
          type: string
          format: date-time
